<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的運動數據戰情室與專屬教練</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- CSS 樣式設計 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .input-panel, .chart-panel {
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }

        h2, h3 { color: #343a40; margin-top: 0; }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #495057;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover { background-color: #0056b3; }

        /* 數位教練區塊的專屬樣式 */
        .coach-panel {
            margin-top: 20px;
            padding: 15px;
            background-color: #e3f2fd; /* 淡藍色背景 */
            border-left: 5px solid #007bff; /* 左側粗邊框強調 */
            border-radius: 8px;
            display: none; /* 初始先隱藏，輸入數據後再顯示 */
        }

        .coach-panel p {
            margin: 0;
            line-height: 1.6;
            color: #004085;
        }

        canvas { width: 100% !important; height: auto !important; }

        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div>
        <div class="input-panel">
            <h2>🏋️‍♂️ 狀態紀錄</h2>
            <div class="input-group">
                <label for="weightInput">今日體重 (kg)</label>
                <input type="number" id="weightInput" placeholder="例如: 75.5" step="0.1">
            </div>
            <div class="input-group">
                <label for="bodyFatInput">今日體脂 (%)</label>
                <input type="number" id="bodyFatInput" placeholder="例如: 18.2" step="0.1">
            </div>
            <button onclick="logTodayData()">記錄並獲取教練建議</button>
        </div>

        <div class="coach-panel" id="coachPanel">
            <h3>🗣️ 教練分析與處方箋</h3>
            <p id="coachMessage"></p>
        </div>
    </div>

    <div class="chart-panel">
        <h3>📈 身體狀態趨勢 (最近 7 次紀錄)</h3>
        <canvas id="bodyStatusChart"></canvas>
    </div>
</div>

<script>
// --- JavaScript：資料儲存、圖表與教練邏輯 ---

// 1. 從 LocalStorage 讀取歷史資料
let savedData = JSON.parse(localStorage.getItem('mySportsData')) || {
    dates: [], weights: [], bodyFats: []
};

// 2. 初始化 Chart.js
const ctx = document.getElementById('bodyStatusChart').getContext('2d');
let myChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: savedData.dates,
        datasets: [{
            label: '體重 (kg)',
            data: savedData.weights,
            borderColor: '#ff6384',
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            yAxisID: 'y-weight',
            tension: 0.3
        }, {
            label: '體脂 (%)',
            data: savedData.bodyFats,
            borderColor: '#36a2eb',
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            yAxisID: 'y-bodyfat',
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        scales: {
            'y-weight': { type: 'linear', position: 'left', title: { display: true, text: '體重 (kg)' } },
            'y-bodyfat': { type: 'linear', position: 'right', title: { display: true, text: '體脂 (%)' }, grid: { drawOnChartArea: false } }
        }
    }
});

// 3. 核心功能：記錄數據
function logTodayData() {
    const weightInput = parseFloat(document.getElementById('weightInput').value);
    const bodyFatInput = parseFloat(document.getElementById('bodyFatInput').value);
    
    if (!weightInput || !bodyFatInput) {
        alert("請確認體重和體脂都有輸入喔！");
        return;
    }

    // 更新陣列資料
    let today = new Date();
    let dateString = (today.getMonth() + 1) + '/' + today.getDate();
    
    savedData.dates.push(dateString);
    savedData.weights.push(weightInput);
    savedData.bodyFats.push(bodyFatInput);

    if (savedData.dates.length > 7) {
        savedData.dates.shift(); savedData.weights.shift(); savedData.bodyFats.shift();
    }
    
    // 更新圖表與存檔
    myChart.update();
    localStorage.setItem('mySportsData', JSON.stringify(savedData));

    // 呼叫數位教練給予建議
    generateCoachAdvice(weightInput, bodyFatInput);

    // 清空輸入框
    document.getElementById('weightInput').value = '';
    document.getElementById('bodyFatInput').value = '';
}

// 4. 🚀 數位教練核心邏輯
function generateCoachAdvice(currentWeight, currentBodyFat) {
    const coachPanel = document.getElementById('coachPanel');
    const coachMessage = document.getElementById('coachMessage');
    
    // 顯示教練區塊
    coachPanel.style.display = 'block';

    let advice = "";
    let trendMessage = "";

    // A. 趨勢比對 (如果有多於一筆資料，就跟上一次比對)
    if (savedData.weights.length > 1) {
        // 抓取「上一次」的紀錄 (陣列倒數第二個)
        let lastWeight = savedData.weights[savedData.weights.length - 2];
        let weightDiff = (currentWeight - lastWeight).toFixed(1);
        
        if (weightDiff < 0) {
            trendMessage = `<strong>【近期動態】</strong> 較上次紀錄減輕了 ${Math.abs(weightDiff)} kg！維持熱量赤字做得很好。<br><br>`;
        } else if (weightDiff > 0) {
            trendMessage = `<strong>【近期動態】</strong> 較上次增加了 ${Math.abs(weightDiff)} kg。若是伴隨訓練強度的提升，這可能是肌肉量增加的好現象，請持續觀察體脂變化。<br><br>`;
        } else {
            trendMessage = `<strong>【近期動態】</strong> 體重與上次持平，身體處於穩定期。<br><br>`;
        }
    }

    // B. 運動科學處方箋 (根據體脂率給予不同階段的建議)
    if (currentBodyFat >= 25) {
        advice = `<strong>【訓練方針】</strong> 目前建議以「建立基礎有氧耐力」為主。可以安排每週 3-4 次、每次 40 分鐘的低強度恆態有氧（如快走、輕鬆騎車），先讓身體適應運動節奏，強化心肺功能，同時避免初期關節負擔過大。`;
    } else if (currentBodyFat >= 15 && currentBodyFat < 25) {
        advice = `<strong>【訓練方針】</strong> 控制得很不錯！建議導入「週期化訓練」，將重量與有氧結合。例如：每週安排兩天全身性肌力訓練（深蹲、硬舉等複合動作），搭配一到兩天的高強度間歇訓練 (HIIT) 或法特萊克跑 (Fartlek)，能有效突破目前的適應期。`;
    } else {
        advice = `<strong>【訓練方針】</strong> 處於非常理想的競技狀態！維持肌肉量與神經徵召能力是關鍵。建議可以將重心轉移至「增強式訓練 (Plyometrics)」或專項的敏捷度訓練（如馬克操、衝刺跑），進一步提升運動表現與爆發力！`;
    }

    // 將趨勢和處方箋合併顯示在畫面上 (使用 innerHTML 支援粗體標籤)
    coachMessage.innerHTML = trendMessage + advice;
}

// 網頁載入時，如果有歷史資料，自動觸發一次教練分析最後一筆數據
window.onload = function() {
    if (savedData.weights.length > 0) {
        let latestWeight = savedData.weights[savedData.weights.length - 1];
        let latestBodyFat = savedData.bodyFats[savedData.bodyFats.length - 1];
        generateCoachAdvice(latestWeight, latestBodyFat);
    }
};
</script>

</body>
</html>
