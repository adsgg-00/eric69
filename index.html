<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的運動數據戰情室</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS：讓頁面看起來現代且整潔 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 2fr; /* 左側 1/3，右側 2/3 */
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 輸入區域樣式 */
        .input-panel {
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }

        h2, h3 { color: #343a40; }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #495057;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            box-sizing: border-box; /* 確保 padding 不會撐破外框 */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 圖表區域樣式 */
        .chart-panel {
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
        }

        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; } /* 手機版改為單欄 */
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="input-panel">
        <h2>🏋️‍♂️ 狀態紀錄</h2>
        <p>在下方輸入你的身體數據，圖表會立即更新。</p>
        
        <div class="input-group">
            <label for="weightInput">今日體重 (kg)</label>
            <input type="number" id="weightInput" placeholder="例如: 75.5" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="bodyFatInput">今日體脂 (%)</label>
            <input type="number" id="bodyFatInput" placeholder="例如: 18.2" step="0.1">
        </div>
        
        <button onclick="logTodayData()">記錄並更新圖表</button>
    </div>

    <div class="chart-panel">
        <h3>📈 身體狀態趨勢 (最近 7 次)</h3>
        <canvas id="bodyStatusChart"></canvas>
    </div>
</div>

<script>
// --- JavaScript：結合 LocalStorage 的圖表控制 ---

// 1. 讀取資料：從 LocalStorage 拿資料，如果沒有 (第一次使用)，就給一組預設的空陣列或假資料
let savedData = JSON.parse(localStorage.getItem('mySportsData')) || {
    dates: ['10/01', '10/02', '10/03', '10/04', '10/05'],
    weights: [78.2, 77.9, 77.8, 77.5, 77.1],
    bodyFats: [22.1, 21.9, 21.8, 21.6, 21.4]
};

// 2. 初始化 Chart.js (使用我們剛剛讀取到的 savedData)
const ctx = document.getElementById('bodyStatusChart').getContext('2d');
let myChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: savedData.dates,
        datasets: [{
            label: '體重 (kg)',
            data: savedData.weights,
            borderColor: '#ff6384',
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            yAxisID: 'y-weight',
            tension: 0.3
        }, {
            label: '體脂 (%)',
            data: savedData.bodyFats,
            borderColor: '#36a2eb',
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            yAxisID: 'y-bodyfat',
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        scales: {
            'y-weight': { type: 'linear', position: 'left', title: { display: true, text: '體重 (kg)' } },
            'y-bodyfat': { type: 'linear', position: 'right', title: { display: true, text: '體脂 (%)' }, grid: { drawOnChartArea: false } }
        }
    }
});

// 3. 核心互動邏輯：記錄、更新圖表並「存檔」
function logTodayData() {
    const weightInput = document.getElementById('weightInput').value;
    const bodyFatInput = document.getElementById('bodyFatInput').value;
    
    if (!weightInput || !bodyFatInput) {
        alert("請確認體重和體脂都有輸入喔！");
        return;
    }

    // 取得今天的日期 (格式化為 月/日)
    let today = new Date();
    let dateString = (today.getMonth() + 1) + '/' + today.getDate();

    // 將新資料推進 (push) 我們的陣列中
    savedData.dates.push(dateString);
    savedData.weights.push(parseFloat(weightInput));
    savedData.bodyFats.push(parseFloat(bodyFatInput));

    // 小巧思：為了保持圖表好看，如果超過 7 筆資料，就把最舊的 (第一筆) 刪掉
    if (savedData.dates.length > 7) {
        savedData.dates.shift(); // 移除陣列的第一個元素
        savedData.weights.shift();
        savedData.bodyFats.shift();
    }
    
    // 更新圖表畫面
    myChart.update();

    // 🌟 關鍵存檔步驟：將更新後的資料轉成純文字，存回 LocalStorage
    localStorage.setItem('mySportsData', JSON.stringify(savedData));

    // 清空輸入框，提升使用者體驗
    document.getElementById('weightInput').value = '';
    document.getElementById('bodyFatInput').value = '';
}
</script>

</body>
</html>
