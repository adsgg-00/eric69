<!DOCTYPE html>
<html lang="zh-TW">
<head>
</head>
<body>
    <div style="width: 80%; max-width: 600px;">
      <h3>📊 本週訓練狀態視覺化</h3>
      <canvas id="myTrainingChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
    // 圖表的設定與數據
    const ctx = document.getElementById('myTrainingChart');

    new Chart(ctx, {
      type: 'bar', // 設定為柱狀圖 (也可以改成 'line' 折線圖)
      data: {
        labels: ['週一', '週二', '週三', '週四', '週五', '週六', '週日'],
        datasets: [{
          label: '每日訓練時數 (小時)',
          data: [1, 1.5, 0, 2, 1, 3, 0], // 這裡就是未來可以讓使用者自己填寫的數據
          backgroundColor: '#36A2EB',
          borderRadius: 5 // 讓柱狀圖邊角變圓滑，比較好看
        }]
      },
      options: {
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
    </script>
</body>
</html>
